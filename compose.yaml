services:
  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  camwatch:
    build:
      context: .
    depends_on:
      - mqtt
    environment:
      CAMWATCH_INPUT: ${CAMWATCH_INPUT:?set CAMWATCH_INPUT to an RTSP URL or mounted file path}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - ./docker/camwatch.compose.toml:/app/camwatch.toml:ro
      - ./samples:/data:ro
    restart: unless-stopped
